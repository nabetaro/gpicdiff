<svg width="64" height="64" viewBox="140 140 400 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>gpicdiff アイコン</title>
  <desc>2枚の画像を重ね合わせて比較するツールのアイコン。</desc>

  <rect x="140" y="140" width="400" height="400" rx="72" fill="#cccccc" stroke="#888888" stroke-width="8"/>

  <!-- 奥の画像フレーム（青・暗め・高彩度） -->
  <rect x="175" y="195" width="260" height="220" rx="14" fill="#002288" stroke="#0055ff" stroke-width="3"/>
  <circle cx="245" cy="268" r="32" fill="#0055ff" opacity="0.9"/>
  <polygon points="175,340 235,280 280,315 320,275 435,340" fill="#0044dd" opacity="0.95"/>

  <!-- 手前の画像フレーム（赤・暗め・高彩度・透過） -->
  <g opacity="0.55">
    <rect x="245" y="265" width="260" height="220" rx="14" fill="#440000" stroke="#ff0000" stroke-width="3"/>
    <circle cx="375" cy="338" r="32" fill="#ff0000" opacity="0.9"/>
    <polygon points="245,410 315,355 355,382 400,348 505,410" fill="#cc0000" opacity="0.95"/>
  </g>

  <rect x="245" y="265" width="190" height="150" rx="4" fill="#ffffff" opacity="0.04"/>
  <line x1="245" y1="265" x2="435" y2="265" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="245" y1="265" x2="245" y2="415" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
</svg>
